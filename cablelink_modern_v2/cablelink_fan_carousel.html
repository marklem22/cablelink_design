
<style>
*{box-sizing:border-box;margin:0;padding:0}
.fan-section{background:#f4f7fc;padding:4rem 5%;font-family:'Montserrat',sans-serif}
.fan-head{text-align:center;margin-bottom:2.5rem}
.fan-tag{font-size:.68rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#F26413;display:block;margin-bottom:.6rem}
.fan-head h2{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:900;color:#0d1b3e;letter-spacing:-.8px}
.fan-stage{position:relative;width:100%;height:480px;display:flex;align-items:center;justify-content:center;perspective:1200px}
.fan-card{
  position:absolute;
  width:52%;max-width:420px;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .55s cubic-bezier(.4,0,.2,1), opacity .55s, box-shadow .55s, z-index 0s;
  will-change:transform;
  user-select:none;
  -webkit-user-select:none;
}
.fan-card img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;aspect-ratio:1/1}
.fan-card.active{
  z-index:10;
  transform:translateX(0) scale(1) rotateY(0deg);
  box-shadow:0 24px 64px rgba(0,35,110,.28);
  opacity:1;
}
.fan-card.prev{
  z-index:5;
  transform:translateX(-62%) scale(.78) rotateY(18deg);
  box-shadow:0 8px 24px rgba(0,35,110,.12);
  opacity:.7;
}
.fan-card.next{
  z-index:5;
  transform:translateX(62%) scale(.78) rotateY(-18deg);
  box-shadow:0 8px 24px rgba(0,35,110,.12);
  opacity:.7;
}
.fan-card.far-prev{
  z-index:1;
  transform:translateX(-110%) scale(.62) rotateY(28deg);
  box-shadow:none;
  opacity:.35;
}
.fan-card.far-next{
  z-index:1;
  transform:translateX(110%) scale(.62) rotateY(-28deg);
  box-shadow:none;
  opacity:.35;
}
.fan-card.hidden{
  z-index:0;
  transform:translateX(0) scale(.5);
  opacity:0;
  pointer-events:none;
}
.fan-controls{display:flex;align-items:center;justify-content:center;gap:1rem;margin-top:1.8rem}
.fan-btn{
  width:44px;height:44px;border-radius:50%;
  background:#fff;border:2px solid rgba(0,70,176,.18);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.07);
  flex-shrink:0;
}
.fan-btn:hover{background:#0046B0;border-color:#0046B0}
.fan-btn:hover svg{stroke:#fff}
.fan-btn svg{width:17px;height:17px;stroke:#0046B0;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s}
.fan-dots{display:flex;gap:7px;align-items:center}
.fan-dot{width:8px;height:8px;border-radius:50%;background:rgba(0,70,176,.2);cursor:pointer;transition:all .25s;border:none;padding:0}
.fan-dot.on{background:#0046B0;width:24px;border-radius:4px}
</style>

<div class="fan-section">
  <h2 class="sr-only">CableLink fan carousel showing promo images</h2>
  <div class="fan-head">
    <span class="fan-tag">Hot Deals</span>
    <h2>Exclusive Promos &amp; Bundles</h2>
  </div>

  <div class="fan-stage" id="fanStage"></div>

  <div class="fan-controls">
    <button class="fan-btn" id="fanPrev" aria-label="Previous">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="fan-dots" id="fanDots"></div>
    <button class="fan-btn" id="fanNext" aria-label="Next">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

<script>
(function(){
  var images=[
    'https://via.placeholder.com/800x450/00236e/ffffff?text=Fiberlink+%40+Home',
    'https://via.placeholder.com/800x450/F26413/ffffff?text=Back+to+School+Promo',
    'https://via.placeholder.com/800x450/034DB6/ffffff?text=Channel+Revamp',
    'https://via.placeholder.com/800x450/0046B0/ffffff?text=iBLAZE+Plan',
    'https://via.placeholder.com/800x450/C94E08/ffffff?text=Refer+A+Friend',
    'https://via.placeholder.com/800x450/001855/ffffff?text=Sports+Bundle',
    'https://via.placeholder.com/800x450/337AB7/ffffff?text=TV+Raffle+Promo',
    'https://via.placeholder.com/800x450/00236e/ffffff?text=Summer+Deal',
  ];

  var cur=0, n=images.length, timer;
  var stage=document.getElementById('fanStage');
  var dotsWrap=document.getElementById('fanDots');

  var cards=images.map(function(src,i){
    var d=document.createElement('div');
    d.className='fan-card';
    var img=document.createElement('img');
    img.src=src;
    img.alt='Promo slide '+(i+1);
    d.appendChild(img);
    d.addEventListener('click',function(){if(getClass(i)!=='active'){go(i);reset()}});
    stage.appendChild(d);
    return d;
  });

  dotsWrap.innerHTML=images.map(function(_,i){
    return '<button class="fan-dot'+(i===0?' on':'')+'" data-i="'+i+'" aria-label="Slide '+(i+1)+'"></button>';
  }).join('');
  var dots=dotsWrap.querySelectorAll('.fan-dot');

  function mod(x){return((x%n)+n)%n}
  function getClass(i){
    var d=mod(i-cur);
    if(d===0)return'active';
    if(d===1)return'next';
    if(d===n-1)return'prev';
    if(d===2)return'far-next';
    if(d===n-2)return'far-prev';
    return'hidden';
  }

  function render(){
    cards.forEach(function(c,i){c.className='fan-card '+getClass(i)});
    dots.forEach(function(d,i){d.classList.toggle('on',i===cur)});
  }

  function go(idx){cur=mod(idx);render()}
  function reset(){clearInterval(timer);timer=setInterval(function(){go(cur+1)},4500)}

  document.getElementById('fanPrev').addEventListener('click',function(){go(cur-1);reset()});
  document.getElementById('fanNext').addEventListener('click',function(){go(cur+1);reset()});
  dots.forEach(function(d){
    d.addEventListener('click',function(){go(+d.dataset.i);reset()});
  });

  var sx;
  stage.addEventListener('touchstart',function(e){sx=e.touches[0].clientX},{passive:true});
  stage.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-sx;
    if(Math.abs(dx)>40){go(dx<0?cur+1:cur-1);reset()}
  },{passive:true});

  render();
  reset();
})();
</script>
